<svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ring component (COLMI R02) — biometric sensor worn on the finger">
  <defs>
    <radialGradient id="ringGlow" cx="0.5" cy="0.5">
      <stop offset="0%" stop-color="#00FFE5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00FFE5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background sensing waves -->
  <g fill="none" stroke="#00FFE5" stroke-width="0.8" opacity="0.18">
    <ellipse cx="140" cy="100" rx="110" ry="38"/>
    <ellipse cx="140" cy="100" rx="95" ry="32"/>
    <ellipse cx="140" cy="100" rx="80" ry="26"/>
  </g>

  <!-- top pulse waveform -->
  <path d="M30,55 L90,55 L98,42 L106,72 L114,28 L122,60 L130,55 L250,55"
        fill="none" stroke="#00FFE5" stroke-width="1" opacity="0.6"/>

  <!-- center radial glow -->
  <circle cx="140" cy="100" r="42" fill="url(#ringGlow)"/>

  <!-- ring 3/4 view -->
  <g transform="translate(140, 100)">
    <!-- outer ring body -->
    <ellipse rx="60" ry="20" fill="#2a2f38" stroke="#80868f" stroke-width="1.5"/>
    <!-- inner ring hole -->
    <ellipse rx="44" ry="13" fill="#050507"/>
    <!-- top highlight -->
    <path d="M-55,-3 Q0,-23 55,-3" fill="none" stroke="#9097a0" stroke-width="0.8" opacity="0.7"/>
    <!-- bottom shadow -->
    <path d="M-55,3 Q0,21 55,3" fill="none" stroke="#1a1f2b" stroke-width="0.5"/>

    <!-- inner LED -->
    <circle cx="0" cy="7" r="2.5" fill="#00FFE5">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="7" fill="none" stroke="#00FFE5" stroke-width="0.5" opacity="0.6">
      <animate attributeName="r" values="3;11;3" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- crosshair markers (left/right) -->
  <g stroke="#8A93A6" stroke-width="0.5" opacity="0.5">
    <line x1="18" y1="100" x2="28" y2="100"/>
    <line x1="23" y1="95" x2="23" y2="105"/>
    <line x1="252" y1="100" x2="262" y2="100"/>
    <line x1="257" y1="95" x2="257" y2="105"/>
  </g>

  <!-- HUD bottom labels -->
  <g font-family="ui-monospace, 'Berkeley Mono', monospace" font-size="9">
    <text x="20" y="178" fill="#8A93A6">◉ BPM 078</text>
    <text x="100" y="178" fill="#00FFE5">SpO 097</text>
    <text x="180" y="178" fill="#8A93A6">T 36.4°C</text>
  </g>

  <!-- corner brackets -->
  <g stroke="#8A93A6" stroke-width="0.6" opacity="0.4" fill="none">
    <path d="M10,10 L10,20 M10,10 L20,10"/>
    <path d="M270,10 L260,10 M270,10 L270,20"/>
    <path d="M10,190 L10,180 M10,190 L20,190"/>
    <path d="M270,190 L260,190 M270,190 L270,180"/>
  </g>
</svg>
