<svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shell component — 3D-printable enclosure variants distributed as STL">
  <!-- 3D printer rail -->
  <line x1="20" y1="22" x2="260" y2="22" stroke="#444a55" stroke-width="1"/>
  <line x1="20" y1="22" x2="20" y2="14" stroke="#444a55"/>
  <line x1="260" y1="22" x2="260" y2="14" stroke="#444a55"/>

  <!-- printer head / nozzle -->
  <g transform="translate(140, 22)">
    <rect x="-12" y="-2" width="24" height="12" fill="#80868f" stroke="#9097a0" stroke-width="0.5"/>
    <polygon points="-2,10 2,10 0,16" fill="#80868f"/>
    <!-- magenta extrusion stream -->
    <line x1="0" y1="16" x2="0" y2="46" stroke="#FF1F8F" stroke-width="1.2" opacity="0.7"/>
    <circle cx="0" r="1.6" fill="#FF1F8F">
      <animate attributeName="cy" values="20;58;20" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- nozzle X position label -->
  <g font-family="ui-monospace, monospace" font-size="6" fill="#8A93A6" opacity="0.6">
    <text x="148" y="28">X 140.0  Y 110.0  Z 1.20</text>
  </g>

  <!-- 3 overlapping shell silhouettes -->
  <g transform="translate(140, 110)">
    <!-- shell 3: bonsai lattice (back, amber) -->
    <g transform="translate(-12, 8)" stroke="#FFAE00" stroke-opacity="0.55" fill="none" stroke-width="1">
      <rect x="-58" y="-32" width="116" height="58"/>
      <line x1="-58" y1="-12" x2="58" y2="-12"/>
      <line x1="-58" y1="6" x2="58" y2="6"/>
      <line x1="-20" y1="-32" x2="-20" y2="26"/>
      <line x1="20" y1="-32" x2="20" y2="26"/>
      <!-- diagonal slats -->
      <line x1="-58" y1="-32" x2="-20" y2="-12" stroke-opacity="0.3"/>
      <line x1="20" y1="-12" x2="58" y2="-32" stroke-opacity="0.3"/>
    </g>

    <!-- shell 1: minimal box (cyan) -->
    <rect x="-58" y="-30" width="116" height="58" fill="rgba(0,255,229,0.04)"
          stroke="#00FFE5" stroke-opacity="0.85" stroke-width="1.5"/>
    <!-- corner notches on minimal box -->
    <g stroke="#00FFE5" stroke-width="1.5" fill="none">
      <path d="M-58,-22 L-50,-22 L-50,-30"/>
      <path d="M58,-22 L50,-22 L50,-30"/>
      <path d="M-58,20 L-50,20 L-50,28"/>
      <path d="M58,20 L50,20 L50,28"/>
    </g>

    <!-- shell 2: organic oval (white, slightly offset front) -->
    <g transform="translate(8, -4)">
      <ellipse rx="50" ry="24" fill="rgba(230,232,238,0.05)"
               stroke="#E6E8EE" stroke-opacity="0.85" stroke-width="1.5"/>
    </g>

    <!-- ghost interior (the core inside) -->
    <g opacity="0.6" stroke="#8A93A6" stroke-width="0.5" fill="none" stroke-dasharray="2,2">
      <rect x="-22" y="-10" width="44" height="20"/>
    </g>
  </g>

  <!-- print bed dotted lines bottom -->
  <g stroke="#444a55" stroke-dasharray="2,3" stroke-width="0.6">
    <line x1="30" y1="160" x2="250" y2="160"/>
    <line x1="30" y1="166" x2="250" y2="166"/>
  </g>

  <!-- HUD labels -->
  <g font-family="ui-monospace, 'Berkeley Mono', monospace" font-size="9">
    <text x="20" y="184" fill="#8A93A6">◉ STL</text>
    <text x="80" y="184" fill="#00FFE5">CC-BY-SA</text>
    <text x="170" y="184" fill="#8A93A6">4 official + ∞</text>
  </g>

  <!-- corner brackets -->
  <g stroke="#8A93A6" stroke-width="0.6" opacity="0.4" fill="none">
    <path d="M10,10 L10,20 M10,10 L20,10"/>
    <path d="M270,10 L260,10 M270,10 L270,20"/>
    <path d="M10,190 L10,180 M10,190 L20,190"/>
    <path d="M270,190 L260,190 M270,190 L270,180"/>
  </g>
</svg>
